<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Stalker: Character Status</title>
    <style>
        body { 
            background: #0a0a12; color: white; font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; 
        }
        #game-container { position: relative; margin-top: 10px; display: flex; gap: 20px; }
        
        /* Side Panel for Stats and Player Icon */
        .side-panel {
            display: flex; flex-direction: column; gap: 15px;
            background: rgba(22, 33, 62, 0.9); padding: 20px;
            border-radius: 8px; border: 1px solid #16213e; width: 150px;
        }

        .player-card {
            text-align: center; background: #1a1a2e; padding: 10px;
            border: 2px solid #4fd1c5; border-radius: 5px;
        }

        #playerIconCanvas {
            background: #9fb471; image-rendering: pixelated;
            border: 2px solid #0f3460; margin-top: 10px;
        }

        canvas#gameCanvas { 
            border: 4px solid #16213e; background-color: #000; 
            image-rendering: pixelated; box-shadow: 0 0 40px rgba(0,0,0,0.9); 
        }

        #minimap {
            position: absolute; bottom: 20px; left: 190px; /* Adjusted for side panel */
            width: 120px; height: 100px; border: 2px solid #4fd1c5;
            background: rgba(0,0,0,0.7); image-rendering: pixelated;
        }

        .ui-top { 
            margin-top: 10px; background: rgba(22, 33, 62, 0.9); padding: 10px 20px; 
            border-radius: 8px; text-align: center; border: 1px solid #16213e; width: 620px;
            display: flex; justify-content: space-between; align-items: center;
        }

        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); flex-direction: column; justify-content: center;
            align-items: center; z-index: 10;
        }
        
        button {
            padding: 8px 12px; cursor: pointer; background: #e94560; color: white; 
            border: none; border-radius: 4px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="color: #4fd1c5;">AREA CLEARED</h1>
        <button onclick="nextLevel()">Next Area</button>
    </div>

    <div class="ui-top">
        <div id="levelDisplay">AREA: 1</div>
        <div id="status">Find the Key</div>
        <button id="muteBtn" onclick="toggleMute()">🎵 ON</button>
    </div>

    <div id="game-container">
        <div class="side-panel">
            <div class="player-card">
                <div style="font-size: 0.8em; margin-bottom: 5px; color: #4fd1c5;">PLAYER</div>
                <canvas id="playerIconCanvas" width="64" height="64"></canvas>
                <div id="keyStatus" style="font-size: 0.7em; margin-top: 8px; color: #aaa;">NO KEY</div>
            </div>
            <div style="font-size: 0.8em; color: #888; text-align: center;">
                Use WASD to move through the deep maze.
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
        <canvas id="minimap"></canvas>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const miniCanvas = document.getElementById('minimap');
const mctx = miniCanvas.getContext('2d');
const pIconCanvas = document.getElementById('playerIconCanvas');
const pctx = pIconCanvas.getContext('2d');

// --- 1. SETTINGS ---
const RADIUS = 10; 
const VIEW_SIZE = (RADIUS * 2) + 1; 
const TILE_SIZE = 32; 
canvas.width = VIEW_SIZE * TILE_SIZE;
canvas.height = VIEW_SIZE * TILE_SIZE;

const TILE_MAP = {
    PATH: [4, 1], Wall: [0, 1], Key: [1, 4], Enemy: [2, 2],
    Gate: { Closed: [1, 1], Open: [1, 2] },
    Player: { Empty: [2, 0], Key: [2, 1] },
    Wall_TL: [4, 0], Wall_T: [2, 4], Wall_TR: [1, 3], Wall_L: [3, 0], Wall_R: [3, 1],
    Wall_BL: [3, 2], Wall_B: [3, 3], Wall_BR: [3, 4], Wall_ITL: [0, 3], Wall_ITR: [0, 4],
    Wall_IBL: [0, 2], Wall_IBR: [1, 0]
};

// --- 2. AUDIO ---
const bgMusic = new Audio('adventure_ST.mp3');
bgMusic.loop = true;
let isMuted = false, musicStarted = false;

function toggleMute() {
    isMuted = !isMuted; bgMusic.muted = isMuted;
    document.getElementById('muteBtn').innerText = isMuted ? "🔇 OFF" : "🎵 ON";
}

// --- 3. GAME STATE ---
const GRID_W = 55, GRID_H = 43;
let currentLevel = 1, maze, player, enemy, isGameOver = false;
const tileset = new Image();
tileset.src = 'tileset.png'; 
tileset.onload = initGame;

function initGame() {
    maze = generateComplexMaze(GRID_W, GRID_H);
    player = { x: 1, y: 1, hasKey: false };
    enemy = { x: GRID_W-2, y: 1, dirX: 0, dirY: 1 };
    isGameOver = false;
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('levelDisplay').innerText = `AREA: ${currentLevel}`;
    document.getElementById('status').innerText = "Find the Key";
    updatePlayerUI();
    render();
}

function nextLevel() { currentLevel++; initGame(); }

// --- 4. NEW: PLAYER ICON UI LOGIC ---
function updatePlayerUI() {
    pctx.clearRect(0, 0, pIconCanvas.width, pIconCanvas.height);
    const coords = player.hasKey ? TILE_MAP.Player.Key : TILE_MAP.Player.Empty;
    const statusText = document.getElementById('keyStatus');
    
    // Draw enlarged player icon
    pctx.drawImage(tileset, coords[1]*16, coords[0]*16, 16, 16, 0, 0, 64, 64);
    
    if(player.hasKey) {
        statusText.innerText = "KEY CARRIED";
        statusText.style.color = "#f9d423";
    } else {
        statusText.innerText = "NO KEY";
        statusText.style.color = "#aaa";
    }
}

// --- 5. GENERATOR (Procedural 2-thick) ---
function generateComplexMaze(w, h) {
    let m = Array.from({ length: h }, () => Array(w).fill(1));
    let stack = [{x: 1, y: 1}]; m[1][1] = 0;
    while (stack.length > 0) {
        let curr = stack[stack.length - 1];
        let dirs = [{x:0,y:-3,sx:0,sy:-1},{x:0,y:3,sx:0,sy:1},{x:-3,y:0,sx:-1,sy:0},{x:3,y:0,sx:1,sy:0}];
        let neighbors = dirs.map(d => ({x:curr.x+d.x, y:curr.y+d.y, sx:d.sx, sy:d.sy}))
                            .filter(n => n.x > 0 && n.x < w-1 && n.y > 0 && n.y < h-1 && m[n.y][n.x] === 1);
        if (neighbors.length > 0) {
            let n = neighbors[Math.floor(Math.random() * neighbors.length)];
            m[n.y][n.x] = 0; m[curr.y+n.sy][curr.x+n.sx] = 0; m[curr.y+(n.sy*2)][curr.x+(n.sx*2)] = 0;
            stack.push(n);
        } else stack.pop();
    }
    // Breadth-First Search for Furthest Gate
    let dists = Array.from({ length: h }, () => Array(w).fill(-1));
    let q = [{x: 1, y: 1, d: 0}]; dists[1][1] = 0;
    let maxD = 0, furthest = {x:1, y:1};
    while (q.length > 0) {
        let {x, y, d} = q.shift();
        if (d > maxD) { maxD = d; furthest = {x, y}; }
        for (let v of [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}]) {
            let nx = x + v.x, ny = y + v.y;
            if (ny >= 0 && ny < h && nx >= 0 && nx < w && m[ny][nx] === 0 && dists[ny][nx] === -1) {
                dists[ny][nx] = d + 1; q.push({x: nx, y: ny, d: d + 1});
            }
        }
    }
    m[furthest.y][furthest.x] = 2; // Gate
    let p = [];
    for(let y=1; y<h-1; y++) for(let x=1; x<w-1; x++) if(m[y][x]===0 && !(x===1 && y===1)) p.push({x,y});
    let kp = p[Math.floor(Math.random() * p.length)];
    m[kp.y][kp.x] = 3; // Key
    return m;
}

// --- 6. CORE RENDER ---
function render() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    let startX = player.x - RADIUS, startY = player.y - RADIUS;

    for (let row = 0; row < VIEW_SIZE; row++) {
        for (let col = 0; col < VIEW_SIZE; col++) {
            let mapX = startX + col, mapY = startY + row;
            drawTile(TILE_MAP.PATH, col, row);
            if (mapX >= 0 && mapX < GRID_W && mapY >= 0 && mapY < GRID_H) {
                const val = maze[mapY][mapX];
                if (val === 1) drawTile(getWallTile(mapX, mapY), col, row);
                else if (val === 2) drawTile(TILE_MAP.Gate.Closed, col, row);
                else if (val === 3) drawTile(TILE_MAP.Key, col, row);
                else if (val === 4) drawTile(TILE_MAP.Gate.Open, col, row);
                if (enemy.x === mapX && enemy.y === mapY) drawTile(TILE_MAP.Enemy, col, row);
            } else drawTile(TILE_MAP.Wall, col, row);
        }
    }
    drawTile(player.hasKey ? TILE_MAP.Player.Key : TILE_MAP.Player.Empty, RADIUS, RADIUS);
    drawMinimap();
}

function drawMinimap() {
    mctx.clearRect(0, 0, miniCanvas.width, miniCanvas.height);
    let sw = miniCanvas.width / GRID_W, sh = miniCanvas.height / GRID_H;
    for(let y=0; y<GRID_H; y++) {
        for(let x=0; x<GRID_W; x++) {
            if(maze[y][x] === 1) mctx.fillStyle = "#16213e";
            else if(maze[y][x] === 2) mctx.fillStyle = "#e94560";
            else if(maze[y][x] === 3) mctx.fillStyle = "#f9d423";
            else mctx.fillStyle = "#0f3460";
            mctx.fillRect(x*sw, y*sh, sw, sh);
        }
    }
    mctx.fillStyle = "#4fd1c5";
    mctx.fillRect(player.x*sw, player.y*sh, sw*2, sh*2);
}

function drawTile(coords, sx, sy) {
    ctx.drawImage(tileset, coords[1]*16, coords[0]*16, 16, 16, sx*TILE_SIZE, sy*TILE_SIZE, TILE_SIZE, TILE_SIZE);
}

function getWallTile(x, y) {
    const isA = (tx, ty) => (tx >= 0 && tx < GRID_W && ty >= 0 && ty < GRID_H) ? maze[ty][tx] !== 1 : false;
    const N = isA(x, y-1), S = isA(x, y+1), W = isA(x-1, y), E = isA(x+1, y);
    const NW = isA(x-1, y-1), NE = isA(x+1, y-1), SW = isA(x-1, y+1), SE = isA(x+1, y+1);
    if (N && W && NW) return TILE_MAP.Wall_TL; if (N && E && NE) return TILE_MAP.Wall_TR;
    if (S && W && SW) return TILE_MAP.Wall_BL; if (S && E && SE) return TILE_MAP.Wall_BR;
    if (N) return TILE_MAP.Wall_T; if (S) return TILE_MAP.Wall_B;
    if (W) return TILE_MAP.Wall_L; if (E) return TILE_MAP.Wall_R;
    if (!N && !E && NE) return TILE_MAP.Wall_IBL; if (!N && !W && NW) return TILE_MAP.Wall_IBR; 
    if (!S && !E && SE) return TILE_MAP.Wall_ITL; if (!S && !W && SW) return TILE_MAP.Wall_ITR; 
    return TILE_MAP.Wall;
}

// --- 7. GAMEPLAY ---
window.addEventListener('keydown', (e) => {
    if (isGameOver) return;
    if (!musicStarted) { bgMusic.play(); musicStarted = true; }
    let nx = player.x, ny = player.y;
    const k = e.key.toLowerCase();
    if (k === 'w') ny--; else if (k === 's') ny++; else if (k === 'a') nx--; else if (k === 'd') nx++;
    if (ny < 0 || ny >= GRID_H || nx < 0 || nx >= GRID_W) return;
    const target = maze[ny][nx];
    if (target === 2 && player.hasKey) {
        maze[ny][nx] = 4; player.hasKey = false;
        isGameOver = true;
        document.getElementById('overlay').style.display = 'flex';
        updatePlayerUI();
    } else if (target !== 1 && target !== 2) {
        if (target === 3) { 
            player.hasKey = true; maze[ny][nx] = 0; 
            document.getElementById('status').innerText = "Key Obtained!";
            updatePlayerUI();
        }
        player.x = nx; player.y = ny;
        updateAI();
        if (player.x === enemy.x && player.y === enemy.y) location.reload();
        render();
    }
});

function updateAI() {
    let dx = player.x - enemy.x, dy = player.y - enemy.y;
    if (Math.random() < 0.3) {
        let mx = Math.sign(dx), my = Math.sign(dy);
        if (Math.abs(dx) > Math.abs(dy)) { if (maze[enemy.y][enemy.x + mx] === 0) enemy.x += mx; }
        else { if (maze[enemy.y + my][enemy.x] === 0) enemy.y += my; }
    }
}
</script>
</body>
</html>
