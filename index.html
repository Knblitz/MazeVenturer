<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Venturer: The Expedition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="homeScreen" class="screen">
        <h1 style="letter-spacing: 4px;">MAZE VENTURER</h1>
        <p style="color: #4fd1c5; margin-top: -15px; letter-spacing: 8px; font-weight: bold; opacity: 0.8;">THE EXPEDITION</p>
        
        <div style="background: rgba(255,255,255,0.05); padding: 15px 30px; border-radius: 8px; margin: 20px; border: 1px solid #16213e;">
            <p style="margin: 5px 0; color: #888;">ALL-TIME BEST</p>
            <h2 id="bestScoreText" style="margin: 0; font-size: 2.5em; color: #f9d423;">000000</h2>
            <div id="lastRunDisplay" style="color: #4fd1c5; font-size: 0.9em; margin-top: 5px;">LAST RUN: 000000</div>
        </div>

        <div style="display: flex; gap: 10px;">
            <button onclick="startNewGame()">BEGIN EXPEDITION</button>
            <button id="continueBtn" class="btn-secondary" onclick="continueGame()" style="display: none;">RESUME RUN</button>
        </div>
    </div>

    <script>
        window.onload = () => {
            // Update Best Score
            const best = localStorage.getItem('maze_venturer_best') || 0;
            document.getElementById('bestScoreText').innerText = best.toString().padStart(6, '0');
            
            // Update Last Run Score
            const last = localStorage.getItem('maze_venturer_last') || 0;
            document.getElementById('lastRunDisplay').innerText = `LAST RUN: ${last.toString().padStart(6, '0')}`;
            
            // Check for saved game
            const saved = localStorage.getItem('maze_venturer_save');
            if (saved) {
                document.getElementById('continueBtn').style.display = 'block';
            }
        };

        function startNewGame() {
            localStorage.setItem('maze_action', 'new');
            window.location.href = 'gameplay.html';
        }

        function continueGame() {
            localStorage.setItem('maze_action', 'continue');
            window.location.href = 'gameplay.html';
        }
    </script>
</body>
</html>
